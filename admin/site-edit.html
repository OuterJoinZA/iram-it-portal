<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iRam Admin — HR Page Editor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Segoe UI', Arial, sans-serif; color: #2D2D2D; display: flex; flex-direction: column; }

    .topbar { display: flex; align-items: center; gap: 14px; background: #2D2D2D; color: #fff; padding: 12px 20px; flex-shrink: 0; }
    .topbar h1 { font-size: 16px; font-weight: 800; margin-right: auto; }
    .topbar .hint { font-size: 12px; color: #bbb; margin-right: auto; }
    .topbar a, .topbar button { font-size: 13px; font-weight: 700; text-decoration: none; border: none; cursor: pointer; padding: 9px 15px; border-radius: 8px; }
    .t-grey { background: #4a4a4a; color: #fff; }
    .t-save { background: #4e9938; color: #fff; }
    .t-save:hover { background: #3d7828; }

    .stage { flex: 1; display: flex; min-height: 0; }
    .frame-wrap { flex: 1; min-width: 0; background: #eceff1; position: relative; }
    iframe { width: 100%; height: 100%; border: none; background: #fff; display: block; }
    .frame-load { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px; }

    .panel { width: 340px; flex-shrink: 0; background: #fff; border-left: 1px solid #e5e8eb; overflow-y: auto; padding: 20px; }
    .panel h2 { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
    .panel .p-sub { font-size: 12.5px; color: #888; line-height: 1.6; margin-bottom: 16px; }
    .lbl { display: block; font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: .4px; margin: 14px 0 6px; }
    textarea, input[type=text] { width: 100%; padding: 9px 11px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 13.5px; font-family: inherit; color: #2D2D2D; line-height: 1.5; }
    textarea:focus, input[type=text]:focus { outline: none; border-color: #4e9938; }
    textarea { resize: vertical; min-height: 90px; }
    .file-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; background: #edf7e8; color: #3d7828; border: 1.5px solid #b3dea8; border-radius: 7px; padding: 8px 14px; font-size: 12.5px; font-weight: 700; cursor: pointer; }
    .file-btn:hover { background: #e0f2d6; }
    .file-note { font-size: 12px; color: #888; margin-top: 8px; }
    .empty { color: #aaa; font-size: 13px; text-align: center; padding: 30px 10px; line-height: 1.7; }

    .blocks-hd { display: flex; align-items: center; gap: 8px; margin: 22px 0 10px; }
    .blocks-hd h2 { margin: 0; }
    .add-btn { margin-left: auto; padding: 6px 12px; background: #edf7e8; color: #3d7828; border: 1.5px solid #b3dea8; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .blk { border: 1px solid #eee; border-radius: 9px; padding: 12px; margin-bottom: 10px; }
    .blk-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .blk-row .mini { flex: 1; padding: 5px 8px; background: #f4f6f8; border: 1px solid #e4e7ea; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .blk-row .mini:hover { background: #e9edf0; }

    .msg { display: none; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; }
    .msg.ok { background: #edf7e8; color: #2f6b1a; border: 1px solid #b3dea8; }
    .msg.err { background: #fdf0f0; color: #a4262c; border: 1px solid #f0c0c0; }
    .warn { background: #fff4e5; border: 1px solid #f0c48a; color: #8a5a00; border-radius: 8px; padding: 10px 13px; font-size: 12px; margin-bottom: 14px; line-height: 1.6; }

    @media (max-width: 780px) { .stage { flex-direction: column; } .panel { width: 100%; border-left: none; border-top: 1px solid #e5e8eb; max-height: 45%; } }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>✏️ HR Page Editor</h1>
    <span class="hint">Click any text, link, or document on the page to edit it →</span>
    <a class="t-grey" href="index.html">← Admin</a>
    <button class="t-grey" onclick="location.reload()">↺ Discard</button>
    <button class="t-save" onclick="saveAll()">💾 Save changes</button>
  </div>

  <div class="stage">
    <div class="frame-wrap">
      <div class="frame-load" id="frame-load">Loading the HR page…</div>
      <iframe id="hr-frame" src="/hr.html"></iframe>
    </div>
    <div class="panel" id="panel">
      <div id="warn" class="warn" style="display:none"></div>
      <div id="msg" class="msg"></div>
      <div id="prop"><div class="empty">Nothing selected.<br>Click something on the page to edit it.</div></div>

      <div class="blocks-hd"><h2>➕ Custom blocks</h2><button class="add-btn" onclick="addBlock()">+ Add</button></div>
      <div class="p-sub">Extra info blocks shown at the bottom of the HR page.</div>
      <div id="blocks"></div>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem('iram_it_auth') !== 'true') location.replace('../login.html');
    const KEY = () => sessionStorage.getItem('iram_it_key') || '';
    const adminFetch = (url, opts = {}) => fetch(url, Object.assign({ cache: 'no-store' }, opts, { headers: Object.assign({}, opts.headers, { 'x-admin-key': KEY() }) }));
    const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    const frame = document.getElementById('hr-frame');
    let idoc = null, iwin = null;
    let selected = null;
    let blocks = [];
    // Set right before a post-save reload. onFrameLoad fires again on that reload —
    // without this it re-fetches /api/admin/hr-content and overwrites `blocks` with
    // whatever that second GET returns, clobbering the just-saved state the moment
    // save finishes (a real race, not hypothetical: reproduced by a slow/failed GET).
    let skipBlocksFetchOnLoad = false;

    frame.addEventListener('load', onFrameLoad);

    async function onFrameLoad() {
      iwin = frame.contentWindow; idoc = frame.contentDocument;
      // wait until hr-render.js has assigned keys + applied overrides
      const t0 = Date.now();
      while (!iwin.__hrReady && Date.now() - t0 < 6000) await new Promise(r => setTimeout(r, 60));

      // editor chrome inside the frame: hide chat/banners, show hover/selected states
      const st = idoc.createElement('style');
      st.textContent = `
        #chat-bot,.chat-bot,[class*="chatbot"],[id*="chatbot"]{display:none!important}
        [data-hr-key]{cursor:pointer;transition:outline .1s,background .1s}
        [data-hr-key]:hover{outline:2px dashed #9cc98a;outline-offset:2px}
        .hr-sel{outline:2px solid #4e9938!important;outline-offset:2px;background:#f4fbf0!important}`;
      idoc.head.appendChild(st);

      idoc.addEventListener('click', e => {
        // The +Add / ✕Remove controls have their own handlers. A remove button
        // on a doc-card sits INSIDE the tagged <a> itself (the card's root IS
        // the link), so without this check the capturing listener below would
        // intercept the click first (capture always runs before the button's
        // own bubble-phase handler) and open text-editing instead of removing it.
        if (e.target.closest('.hr-repeat-rm, .hr-repeat-add')) return;
        const el = e.target.closest('[data-hr-key]');
        if (el) { e.preventDefault(); e.stopPropagation(); select(el); }
      }, true);

      // Repeater +Add/✕Remove controls — safe to enable unconditionally: this
      // script only ever runs inside the admin-gated editor, never on the
      // public page.
      iwin.__hrEnableRepeaterControls && iwin.__hrEnableRepeaterControls();

      // load overrides for the storage-ready flag + blocks (frame already applied them).
      // Skipped on a reload we triggered ourselves right after a save — saveAll()
      // already holds the freshest blocks from the save response; re-fetching here
      // would race it and can overwrite correct state with stale or empty data.
      const skipBlocks = skipBlocksFetchOnLoad;
      skipBlocksFetchOnLoad = false;
      try {
        const res = await adminFetch('/api/admin/hr-content');
        if (res.status === 401) { sessionStorage.clear(); location.replace('../login.html'); return; }
        const data = await res.json().catch(() => ({}));
        if (!skipBlocks) {
          blocks = Array.isArray(data.content && data.content.blocks) ? data.content.blocks : [];
          renderBlocks();
        }
        if (data.storageReady === false) {
          const w = document.getElementById('warn');
          w.style.display = 'block';
          w.innerHTML = '⚠️ <strong>Storage not connected.</strong> You can edit, but saving will fail until a Vercel Blob store is connected and the project redeployed.';
        }
      } catch (_) {}

      document.getElementById('frame-load').style.display = 'none';
    }

    function select(el) {
      if (selected) selected.classList.remove('hr-sel');
      selected = el; el.classList.add('hr-sel');
      el.scrollIntoView({ block: 'center', behavior: 'smooth' });
      const kind = el.dataset.hrKind;
      const prop = document.getElementById('prop');

      if (kind === 'text') {
        prop.innerHTML = `<h2>📝 Text</h2><p class="p-sub">Edit the wording. Updates the page live.</p>
          <span class="lbl">Text</span><textarea id="f-text"></textarea>
          <div id="card-link-note"></div>`;
        const ta = document.getElementById('f-text');
        ta.value = el.textContent;
        ta.oninput = () => { el.textContent = ta.value; };
        ta.focus();
        // This text is part of a document/welcome card (title, subtitle, …) —
        // most of a card's visible area is covered by fields like this one, so
        // clicking "the card itself" to reach its file/link is rarely reachable.
        // Surface an explicit path to that editor instead of relying on it.
        const cardLink = el.closest('a[data-hr-kind="link-card"]');
        if (cardLink) {
          document.getElementById('card-link-note').innerHTML =
            `<button type="button" class="file-btn" style="margin-top:14px" id="goto-card-link">📎 Edit this card's link / file →</button>`;
          document.getElementById('goto-card-link').onclick = () => select(cardLink);
        }
      } else if (kind === 'link-card') {
        // Structured card link (icon + title/subtitle) — never edit its text
        // here; that would flatten the card to plain text on save. Title and
        // subtitle are their own independent text fields (click them directly).
        prop.innerHTML = `<h2>🔗 Document</h2>
          <p class="p-sub">This card's title and subtitle are separate fields — click them directly to edit their wording. This controls the file or link the whole card points to.</p>
          <span class="lbl">Link URL</span><input type="text" id="f-lhref" placeholder="https://…">
          <label class="file-btn">📎 Replace file<input type="file" accept="application/pdf,image/*" hidden id="f-lfile"></label>
          <div class="file-note" id="f-lnote"></div>`;
        const hr = document.getElementById('f-lhref');
        hr.value = el.getAttribute('href') || '';
        hr.oninput = () => { el.setAttribute('href', hr.value); };
        document.getElementById('f-lfile').onchange = e => uploadFile(el, e.target.files[0]);
      } else {
        // Plain link (mailto/tel/simple text link) — label and href are both
        // this ONE element's own content, safe to edit directly.
        const isFile = /\.(pdf|png|jpe?g|gif|webp)$/i.test(el.getAttribute('href') || '') || /\/api\/hr-file\?/.test(el.getAttribute('href') || '');
        prop.innerHTML = `<h2>🔗 Link${isFile ? ' / Document' : ''}</h2>
          <p class="p-sub">Change the label, where it points, or replace the file behind it.</p>
          <span class="lbl">Label</span><input type="text" id="f-ltext">
          <span class="lbl">Link URL</span><input type="text" id="f-lhref" placeholder="https://…  or  mailto:…">
          <label class="file-btn">📎 Replace file<input type="file" accept="application/pdf,image/*" hidden id="f-lfile"></label>
          <div class="file-note" id="f-lnote"></div>`;
        const tx = document.getElementById('f-ltext'), hr = document.getElementById('f-lhref');
        tx.value = el.textContent; hr.value = el.getAttribute('href') || '';
        tx.oninput = () => { el.textContent = tx.value; };
        hr.oninput = () => { el.setAttribute('href', hr.value); };
        document.getElementById('f-lfile').onchange = e => uploadFile(el, e.target.files[0]);
      }
    }

    async function uploadFile(el, file) {
      if (!file) return;
      const note = document.getElementById('f-lnote');
      if (file.size > 4.3 * 1024 * 1024) { note.textContent = 'File is over ~4 MB — compress it first.'; note.style.color = '#a4262c'; return; }
      note.textContent = 'Uploading…'; note.style.color = '#777';
      try {
        const dataUrl = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
        const resp = await adminFetch('/api/admin/hr-upload', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ key: el.dataset.hrKey, dataUrl }) });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) { note.textContent = data.error || 'Upload failed.'; note.style.color = '#a4262c'; return; }
        el.setAttribute('href', data.url);
        document.getElementById('f-lhref').value = data.url;
        note.textContent = '✓ New file attached — remember to Save.'; note.style.color = '#2f6b1a';
      } catch (_) { note.textContent = 'Upload failed — network error.'; note.style.color = '#a4262c'; }
    }

    // ── Custom blocks (right panel) — handlers via delegation, not inline ──────
    function renderBlocks() {
      document.getElementById('blocks').innerHTML = blocks.map((b, i) => `
        <div class="blk" data-i="${i}">
          <div class="blk-row">
            <button class="mini" data-act="up">↑</button>
            <button class="mini" data-act="down">↓</button>
            <button class="mini" data-act="rm" style="color:#a4262c">✕ Remove</button>
          </div>
          <span class="lbl">Heading</span><input type="text" data-f="heading" value="${esc(b.heading)}">
          <span class="lbl">Body</span><textarea data-f="body">${esc(b.body)}</textarea>
          <span class="lbl">Link text</span><input type="text" data-f="linkText" value="${esc(b.linkText)}">
          <span class="lbl">Link URL</span><input type="text" data-f="linkUrl" value="${esc(b.linkUrl)}" placeholder="https://…">
        </div>`).join('');
    }
    const blocksHost = document.getElementById('blocks');
    blocksHost.addEventListener('input', e => {
      const f = e.target.dataset.f; if (!f) return;
      blocks[+e.target.closest('.blk').dataset.i][f] = e.target.value;
    });
    blocksHost.addEventListener('click', e => {
      const btn = e.target.closest('.mini'); if (!btn) return;
      const i = +btn.closest('.blk').dataset.i;
      if (btn.dataset.act === 'rm') { blocks.splice(i, 1); }
      else { const j = i + (btn.dataset.act === 'up' ? -1 : 1); if (j < 0 || j >= blocks.length) return; [blocks[i], blocks[j]] = [blocks[j], blocks[i]]; }
      renderBlocks();
    });
    window.addBlock = () => { blocks.push({ heading:'', body:'', linkText:'', linkUrl:'' }); renderBlocks(); };

    // ── Collect + save ─────────────────────────────────────────────────────────
    // querySelectorAll never includes its own root — matters for repeat items
    // whose root IS a tagged element (a doc-card's root is the <a> itself).
    function fieldsOf(el) {
      return [...(el.hasAttribute('data-hr-key') ? [el] : []), ...el.querySelectorAll('[data-hr-key]')];
    }

    function collectFields(scope, text, links) {
      fieldsOf(scope).forEach(el => {
        const k = el.dataset.hrKey;
        if (el.dataset.hrKind === 'text') text[k] = el.textContent;
        else if (el.dataset.hrKind === 'link') links[k] = { text: el.textContent, href: el.getAttribute('href') || '' };
        else if (el.dataset.hrKind === 'link-card') links[k] = { href: el.getAttribute('href') || '' }; // no text — see isCardLink()
      });
    }

    // Repeat sections (HR contacts, document cards, welcome items, policy
    // bullets): an original item hidden by the ✕ button becomes a removed id;
    // an added item's OWN fields are collected scoped to just that item's
    // subtree (never mixed into the global text/links maps — two added items
    // in the same group would otherwise start from identical placeholder text
    // and collide on the same key).
    function collectRepeaters() {
      const repeaters = {};
      const groupIds = new Set([...idoc.querySelectorAll('[data-hr-group]')].map(el => el.dataset.hrGroup));
      groupIds.forEach(id => {
        const removed = [], added = [];
        idoc.querySelectorAll(`[data-hr-group="${CSS.escape(id)}"]`).forEach(item => {
          if (item.dataset.hrAdded === 'true') {
            const text = {}, links = {};
            collectFields(item, text, links);
            added.push({ text, links });
          } else if (item.style.display === 'none') {
            removed.push(item.dataset.hrItemId);
          }
        });
        if (removed.length || added.length) repeaters[id] = { removed, added };
      });
      return repeaters;
    }

    function collect() {
      const text = {}, links = {};
      // ORIGINAL repeat items (contacts, doc-cards, …) collect globally here
      // exactly like any other page field — there's only one instance of each,
      // so their content-based keys are already unique. Only ADDED items are
      // excluded and collected separately (scoped, see collectRepeaters above):
      // every added item starts from the SAME placeholder text, so without
      // per-item scoping two added items in one group would collide on the
      // same key and overwrite each other's saved values.
      idoc.querySelectorAll('[data-hr-key]').forEach(el => {
        if (el.closest('[data-hr-added="true"]')) return;
        const k = el.dataset.hrKey;
        if (el.dataset.hrKind === 'text') text[k] = el.textContent;
        else if (el.dataset.hrKind === 'link') links[k] = { text: el.textContent, href: el.getAttribute('href') || '' };
        else if (el.dataset.hrKind === 'link-card') links[k] = { href: el.getAttribute('href') || '' };
      });
      return { text, links, blocks, repeaters: collectRepeaters() };
    }

    window.saveAll = async () => {
      const msg = document.getElementById('msg'); msg.style.display = 'none';
      try {
        const resp = await adminFetch('/api/admin/hr-content', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(collect()) });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) { show(msg, 'err', data.error || ('Save failed (' + resp.status + ').')); return; }
        blocks = (data.content && data.content.blocks) || [];
        renderBlocks();
        // Reload the frame so every edit (including newly-uploaded files) reflects
        // the saved state, and clear the current selection. `blocks` above is
        // already the freshest copy, so skip onFrameLoad's redundant re-fetch.
        selected = null;
        skipBlocksFetchOnLoad = true;
        document.getElementById('prop').innerHTML = '<div class="empty">Saved ✓<br>Click something on the page to keep editing.</div>';
        try { frame.contentWindow.location.reload(); } catch (_) {}
        show(msg, 'ok', '✓ Saved — live on the HR page for everyone now.');
      } catch (_) { show(msg, 'err', 'Network error — could not reach the server.'); }
    };
    function show(el, cls, t) { el.className = 'msg ' + cls; el.textContent = t; el.style.display = 'block'; }
  </script>
</body>
</html>
