<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iRam — 404 Not Found</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪿</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8f4fd;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Text section ── */
    .text-area {
      text-align: center;
      padding: 20px 20px 0;
      position: relative;
      z-index: 2;
    }
    .err-code {
      font-size: clamp(72px, 15vw, 110px);
      font-weight: 900;
      color: #2D2D2D;
      line-height: 1;
      letter-spacing: -4px;
    }
    .err-code span { color: #4e9938; }
    h1 {
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 700;
      color: #2D2D2D;
      margin: 8px 0 6px;
    }
    .sub {
      font-size: 15px;
      color: #666;
      line-height: 1.55;
      margin-bottom: 22px;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #4e9938;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 11px 26px;
      border-radius: 10px;
      text-decoration: none;
      letter-spacing: .2px;
      transition: background .15s, transform .1s;
    }
    .btn-home:hover { background: #3d7828; transform: translateY(-1px); }

    /* ── Field scene ── */
    .field-scene {
      width: 100%;
      max-width: 800px;
      position: relative;
      flex-shrink: 0;
      z-index: 1;
    }
    .field-scene svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Cloud drift ── */
    .cloud1 { animation: cloud-drift 28s linear infinite; }
    .cloud2 { animation: cloud-drift 22s linear infinite reverse; animation-delay: -10s; }
    @keyframes cloud-drift {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(18px); }
      100% { transform: translateX(0); }
    }

    /* ── Goose walk (wrapper for horizontal movement) ── */
    .goose-walk {
      animation: goose-wander 14s ease-in-out infinite;
    }
    @keyframes goose-wander {
      0%       { transform: translateX(0)    scaleX(1);  }   /* start left */
      28%      { transform: translateX(310px) scaleX(1);  }  /* reached right */
      35%      { transform: translateX(310px) scaleX(-1); }  /* turn around */
      62%      { transform: translateX(40px)  scaleX(-1); }  /* walked back left, overshoot */
      68%      { transform: translateX(40px)  scaleX(-1); }  /* confused pause */
      70%      { transform: translateX(40px)  scaleX(1);  }  /* another turn */
      75%      { transform: translateX(160px) scaleX(1);  }  /* walk to middle */
      78%      { transform: translateX(160px) scaleX(-1); }  /* look other way */
      84%      { transform: translateX(160px) scaleX(-1); }  /* stuck pause */
      88%      { transform: translateX(160px) scaleX(1);  }  /* back */
      100%     { transform: translateX(0)    scaleX(1);  }   /* return start */
    }

    /* ── Goose body bob ── */
    .goose-bob {
      animation: body-bob 0.55s ease-in-out infinite alternate;
    }
    @keyframes body-bob {
      to { transform: translateY(-7px); }
    }

    /* ── Leg swing ── */
    .leg-l-walk {
      transform-box: fill-box; transform-origin: 50% 0;
      animation: leg-la 0.55s ease-in-out infinite alternate;
    }
    .leg-r-walk {
      transform-box: fill-box; transform-origin: 50% 0;
      animation: leg-ra 0.55s ease-in-out infinite alternate;
    }
    @keyframes leg-la { to { transform: rotate( 18deg); } }
    @keyframes leg-ra { to { transform: rotate(-18deg); } }

    /* ── Head look around ── */
    .head-look {
      transform-box: fill-box; transform-origin: 50% 90%;
      animation: head-peer 14s ease-in-out infinite;
    }
    @keyframes head-peer {
      0%,27%  { transform: rotate(0deg);   }
      30%,36% { transform: rotate(-18deg); }  /* look back/up when turning */
      42%     { transform: rotate(0deg);   }
      62%,68% { transform: rotate(10deg);  }  /* confused tilt */
      72%,76% { transform: rotate(-10deg); }
      82%,86% { transform: rotate(15deg);  }  /* frustrated look */
      100%    { transform: rotate(0deg);   }
    }

    /* ── Question marks that pop ── */
    .q1 { animation: qmark 14s ease-in-out infinite; }
    .q2 { animation: qmark 14s ease-in-out infinite; animation-delay: .4s; }
    @keyframes qmark {
      0%,60%  { opacity: 0; transform: translateY(0)   scale(0); }
      65%     { opacity: 1; transform: translateY(-10px) scale(1.1); }
      72%     { opacity: 1; transform: translateY(-18px) scale(1); }
      80%     { opacity: 0; transform: translateY(-28px) scale(0.7); }
      100%    { opacity: 0; }
    }

    /* ── Honk speech bubble ── */
    .honk-bubble {
      animation: honk-pop 14s ease-in-out infinite;
    }
    @keyframes honk-pop {
      0%,24%  { opacity: 0; transform: scale(0); }
      28%     { opacity: 1; transform: scale(1.1); }
      32%,42% { opacity: 1; transform: scale(1); }
      48%     { opacity: 0; transform: scale(0); }
      100%    { opacity: 0; }
    }

    /* ── Sign wobble ── */
    .sign-group {
      transform-box: fill-box; transform-origin: 50% 100%;
      animation: sign-wobble 6s ease-in-out infinite;
    }
    @keyframes sign-wobble {
      0%,100% { transform: rotate(0deg); }
      25%     { transform: rotate(1.5deg); }
      75%     { transform: rotate(-1.5deg); }
    }

    /* ── Grass sway ── */
    .grass-blade { transform-box: fill-box; transform-origin: 50% 100%; }
    .g1 { animation: sway 3.2s ease-in-out infinite; }
    .g2 { animation: sway 2.8s ease-in-out infinite; animation-delay:.5s; }
    .g3 { animation: sway 3.5s ease-in-out infinite; animation-delay:1s; }
    .g4 { animation: sway 2.6s ease-in-out infinite; animation-delay:.2s; }
    .g5 { animation: sway 3.8s ease-in-out infinite; animation-delay:1.4s; }
    @keyframes sway {
      0%,100% { transform: rotate(0deg);  }
      50%     { transform: rotate(10deg); }
    }

    /* ── Butterfly ── */
    .butterfly {
      animation: flutter-path 18s linear infinite;
    }
    .wing-l { animation: flutter-l 0.3s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: right center; }
    .wing-r { animation: flutter-r 0.3s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: left center; }
    @keyframes flutter-l { to { transform: scaleX(0.2) skewY(-20deg); } }
    @keyframes flutter-r { to { transform: scaleX(0.2) skewY(20deg); } }
    @keyframes flutter-path {
      0%  { transform: translate(80px,80px); }
      20% { transform: translate(150px,55px); }
      40% { transform: translate(240px,90px); }
      60% { transform: translate(180px,65px); }
      80% { transform: translate(100px,75px); }
      100%{ transform: translate(80px,80px); }
    }
  </style>
</head>
<body>

  <!-- Text -->
  <div class="text-area">
    <div class="err-code">4<span>0</span>4</div>
    <h1>Honk! This page got lost in the field.</h1>
    <p class="sub">Our field goose went looking for it but came back confused.<br>It doesn't seem to exist — or it moved somewhere else.</p>
    <a href="/" class="btn-home">← Back to the Portal</a>
  </div>

  <!-- Animated field scene -->
  <div class="field-scene">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" preserveAspectRatio="xMidYMax meet">
      <defs>
        <linearGradient id="sky404" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#c5e8f8"/>
          <stop offset="100%" stop-color="#e8f4fd"/>
        </linearGradient>
        <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6aba42"/>
          <stop offset="100%" stop-color="#4a9228"/>
        </linearGradient>
        <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5aa836"/>
          <stop offset="100%" stop-color="#3d8020"/>
        </linearGradient>
        <linearGradient id="ground404" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4a9228"/>
          <stop offset="100%" stop-color="#3a7020"/>
        </linearGradient>
      </defs>

      <!-- Sky -->
      <rect width="800" height="320" fill="url(#sky404)"/>

      <!-- Sun -->
      <circle cx="700" cy="55" r="38" fill="#FFE066" opacity=".85"/>
      <circle cx="700" cy="55" r="30" fill="#FFD000" opacity=".9"/>

      <!-- Clouds -->
      <g class="cloud1">
        <ellipse cx="140" cy="58" rx="55" ry="26" fill="white" opacity=".88"/>
        <ellipse cx="180" cy="50" rx="40" ry="22" fill="white" opacity=".88"/>
        <ellipse cx="108" cy="64" rx="32" ry="18" fill="white" opacity=".88"/>
      </g>
      <g class="cloud2">
        <ellipse cx="490" cy="40" rx="65" ry="28" fill="white" opacity=".82"/>
        <ellipse cx="540" cy="32" rx="45" ry="24" fill="white" opacity=".82"/>
        <ellipse cx="450" cy="47" rx="38" ry="20" fill="white" opacity=".82"/>
      </g>

      <!-- Back hill -->
      <path d="M0 210 Q80 170 200 190 Q350 205 500 175 Q640 148 800 185 L800 320 L0 320 Z" fill="url(#hill1)"/>

      <!-- Mid hill -->
      <path d="M0 240 Q120 210 280 230 Q440 248 580 222 Q700 205 800 235 L800 320 L0 320 Z" fill="url(#hill2)"/>

      <!-- Front ground -->
      <rect x="0" y="278" width="800" height="42" fill="url(#ground404)"/>
      <path d="M0 278 Q200 268 400 275 Q600 280 800 270 L800 282 Q600 292 400 287 Q200 282 0 290 Z" fill="#4a9228"/>

      <!-- Grass blades (front) -->
      <g fill="#3a8020">
        <path class="grass-blade g1" d="M30 278 L34 258 L38 278"/>
        <path class="grass-blade g2" d="M65 280 L68 262 L71 280"/>
        <path class="grass-blade g3" d="M110 276 L115 255 L120 276"/>
        <path class="grass-blade g4" d="M185 279 L188 260 L191 279"/>
        <path class="grass-blade g1" d="M250 277 L254 258 L258 277"/>
        <path class="grass-blade g5" d="M330 280 L334 260 L338 280"/>
        <path class="grass-blade g2" d="M410 278 L413 257 L416 278"/>
        <path class="grass-blade g3" d="M490 276 L494 255 L498 276"/>
        <path class="grass-blade g4" d="M565 279 L568 260 L571 279"/>
        <path class="grass-blade g1" d="M640 278 L644 257 L648 278"/>
        <path class="grass-blade g5" d="M710 280 L714 260 L718 280"/>
        <path class="grass-blade g2" d="M760 276 L764 255 L768 276"/>
      </g>

      <!-- Daisies -->
      <g>
        <!-- Daisy 1 -->
        <circle cx="80" cy="278" r="4" fill="white"/>
        <circle cx="80" cy="278" r="2" fill="#FFD700"/>
        <!-- Daisy 2 -->
        <circle cx="310" cy="276" r="3.5" fill="white"/>
        <circle cx="310" cy="276" r="1.8" fill="#FFD700"/>
        <!-- Daisy 3 -->
        <circle cx="620" cy="279" r="4" fill="white"/>
        <circle cx="620" cy="279" r="2" fill="#FFD700"/>
        <!-- Daisy 4 -->
        <circle cx="740" cy="277" r="3" fill="#FFB6C1"/>
        <circle cx="740" cy="277" r="1.5" fill="#FFD700"/>
        <!-- Small wildflowers -->
        <circle cx="200" cy="277" r="2.5" fill="#b8e0a0"/>
        <circle cx="480" cy="275" r="2.5" fill="#b8e0a0"/>
      </g>

      <!-- 404 Sign (wobbling) -->
      <g class="sign-group" transform="translate(560, 200)">
        <!-- Post -->
        <rect x="-5" y="0" width="10" height="80" rx="4" fill="#8B6332"/>
        <!-- Board -->
        <rect x="-52" y="-70" width="104" height="72" rx="6" fill="#c8a460"/>
        <rect x="-52" y="-70" width="104" height="72" rx="6" stroke="#8B6332" stroke-width="2.5" fill="none"/>
        <!-- Wood grain lines -->
        <line x1="-42" y1="-60" x2="42" y2="-60" stroke="#b89448" stroke-width="0.8" opacity=".6"/>
        <line x1="-42" y1="-50" x2="42" y2="-50" stroke="#b89448" stroke-width="0.8" opacity=".6"/>
        <!-- Sign text -->
        <text x="0" y="-32" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="30" fill="#2D2D2D">404</text>
        <text x="0" y="-16" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" font-size="10" fill="#5a3e0a">YOU ARE HERE</text>
        <text x="0" y="-4" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#8a6028">↑ (maybe)</text>
        <!-- Arrow sticking out bottom of post -->
        <path d="M-6 80 L-6 92 L-12 92 L0 105 L12 92 L6 92 L6 80 Z" fill="#8B6332"/>
      </g>

      <!-- Butterfly -->
      <g class="butterfly">
        <g class="wing-l"><path d="M-14,0 Q-22,-12 -10,-16 Q-2,-12 0,0 Z" fill="#FF8C69" opacity=".85"/></g>
        <g class="wing-r"><path d="M14,0 Q22,-12 10,-16 Q2,-12 0,0 Z" fill="#FF8C69" opacity=".85"/></g>
        <ellipse cx="0" cy="0" rx="2.5" ry="7" fill="#4a2800"/>
      </g>

      <!-- ====== GOOSE (walking) ====== -->
      <g class="goose-walk" transform="translate(60, 210)">
        <g class="goose-bob">

          <!-- Q marks (pop up when confused) -->
          <g class="q1">
            <text x="30" y="-80" font-size="22" font-weight="900" fill="#4e9938" font-family="Arial,sans-serif">?</text>
          </g>
          <g class="q2">
            <text x="55" y="-95" font-size="16" font-weight="900" fill="#6BBF4E" font-family="Arial,sans-serif">?</text>
          </g>

          <!-- Honk speech bubble -->
          <g class="honk-bubble" transform="translate(60,-88)">
            <rect x="-28" y="-18" width="72" height="30" rx="12" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
            <path d="M14 12 L8 22 L22 14" fill="white" stroke="#e0e0e0" stroke-width="1.5" stroke-linejoin="round"/>
            <text x="8" y="-1" text-anchor="middle" font-size="13" font-weight="800" fill="#2D2D2D" font-family="'Segoe UI',Arial,sans-serif">HONK?</text>
          </g>

          <!-- Shadow -->
          <ellipse cx="55" cy="72" rx="44" ry="6" fill="rgba(0,0,0,0.14)"/>

          <!-- BODY -->
          <ellipse cx="58" cy="44" rx="42" ry="30" fill="#f5f3e8"/>
          <!-- Wing -->
          <ellipse cx="62" cy="48" rx="32" ry="21" fill="#ebe8d6" transform="rotate(-8 62 48)"/>
          <path d="M24 40 Q58 28 90 40" stroke="#d5d0be" stroke-width="1.2" fill="none"/>
          <path d="M26 51 Q58 39 88 51" stroke="#d5d0be" stroke-width="1" fill="none"/>
          <!-- Tail -->
          <path d="M96 34 L110 24 L107 38 L100 44 Z" fill="#ebe8d6" stroke="#d5d0be" stroke-width="1"/>

          <!-- NECK -->
          <path d="M38 20 Q22 8 26 -8 Q30 -22 32 -30"
                stroke="#dedad0" stroke-width="17" fill="none" stroke-linecap="round"/>
          <path d="M38 20 Q22 8 26 -8 Q30 -22 32 -30"
                stroke="#f5f3e8" stroke-width="14" fill="none" stroke-linecap="round"/>

          <!-- HEAD group (with look animation) -->
          <g class="head-look">
            <!-- Head -->
            <ellipse cx="32" cy="-36" rx="15" ry="11" fill="#f5f3e8" stroke="#dedad0" stroke-width="1.2"/>

            <!-- Eye -->
            <circle cx="25" cy="-39" r="3.8" fill="#1a1a1a"/>
            <circle cx="24" cy="-40" r="1.4" fill="white"/>

            <!-- Confused eyebrow -->
            <path d="M21 -44 Q25 -47 29 -44" stroke="#b0a898" stroke-width="1.5" fill="none" stroke-linecap="round"/>

            <!-- Beak -->
            <path d="M20 -34 L7 -36 L7 -31 L20 -32 Z" fill="#e07828"/>
            <line x1="7" y1="-33.5" x2="20" y2="-33.5" stroke="#b86018" stroke-width=".7"/>
          </g>

          <!-- LEGS (animated walk) -->
          <g class="leg-l-walk">
            <line x1="38" y1="72" x2="30" y2="88" stroke="#e07828" stroke-width="4" stroke-linecap="round"/>
            <path d="M30 88 L21 88 L25 84 M30 88 L33 92" stroke="#e07828" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <g class="leg-r-walk">
            <line x1="56" y1="74" x2="64" y2="90" stroke="#e07828" stroke-width="4" stroke-linecap="round"/>
            <path d="M64 90 L55 90 L59 86 M64 90 L67 94" stroke="#e07828" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </g>

        </g><!-- /goose-bob -->
      </g><!-- /goose-walk -->

    </svg>
  </div>

</body>
</html>
