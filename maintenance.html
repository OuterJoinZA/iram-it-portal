<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iRam — Scheduled Maintenance</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪿</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1c1c1c;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle green glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 110%, rgba(78,153,56,.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 10% 20%, rgba(78,153,56,.06) 0%, transparent 60%),
        #1c1c1c;
      z-index: 0;
    }

    /* Floating dust particles */
    .particles { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(107,191,78,.35);
      animation: drift linear infinite;
    }
    .particle:nth-child(1)  { left:8%;   animation-duration:18s; animation-delay:0s;   width:2px; height:2px; }
    .particle:nth-child(2)  { left:22%;  animation-duration:24s; animation-delay:4s;   }
    .particle:nth-child(3)  { left:38%;  animation-duration:20s; animation-delay:8s;   width:4px; height:4px; background:rgba(107,191,78,.2); }
    .particle:nth-child(4)  { left:58%;  animation-duration:16s; animation-delay:2s;   }
    .particle:nth-child(5)  { left:74%;  animation-duration:22s; animation-delay:6s;   width:2px; height:2px; }
    .particle:nth-child(6)  { left:90%;  animation-duration:19s; animation-delay:11s;  width:4px; height:4px; background:rgba(107,191,78,.2); }
    @keyframes drift {
      from { transform: translateY(110vh); opacity:0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      to   { transform: translateY(-10vh); opacity:0; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── iRam brand ── */
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
      opacity: 0.85;
    }
    .brand-text { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .brand-sub  { font-size: 10px; font-weight: 600; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: 1.5px; }

    /* ── Puzzle logo ── */
    .puzzle-wrap {
      position: relative;
      width: 136px;
      height: 136px;
      margin-bottom: 8px;
    }
    .sq {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      animation: assemble 7s cubic-bezier(.4,0,.2,1) infinite;
    }
    /* Grid positions for the cross */
    .sq-top    { top:0;   left:48px; background:#6BBF4E; --dx:-35px; --dy:-55px; --r:-18deg; animation-delay:0s;   }
    .sq-left   { top:48px; left:0;   background:#6BBF4E; --dx:-60px; --dy:18px;  --r:14deg;  animation-delay:.15s; }
    .sq-center { top:48px; left:48px; background:#4e9938; --dx:8px;  --dy:42px;  --r:-8deg;  animation-delay:.05s; }
    .sq-right  { top:48px; left:96px; background:#6BBF4E; --dx:55px; --dy:-18px; --r:22deg;  animation-delay:.2s;  }
    .sq-bottom { top:96px; left:48px; background:#6BBF4E; --dx:28px; --dy:58px;  --r:-12deg; animation-delay:.1s;  }

    @keyframes assemble {
      0%,25%  { transform: translate(var(--dx), var(--dy)) rotate(var(--r)); opacity:.65; }
      50%,78% { transform: translate(0,0) rotate(0deg); opacity:1; }
      95%,100%{ transform: translate(var(--dx), var(--dy)) rotate(var(--r)); opacity:.65; }
    }

    /* Glint on assembled logo */
    .puzzle-glint {
      position: absolute;
      inset: 0;
      border-radius: 4px;
      background: linear-gradient(135deg, rgba(255,255,255,.25) 0%, transparent 60%);
      animation: glint-fade 7s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glint-fade {
      0%,45%   { opacity:0; }
      58%,74%  { opacity:1; }
      85%,100% { opacity:0; }
    }

    /* ── Goose ── */
    .goose-area {
      position: relative;
      width: 240px;
      height: 270px;
      margin: -10px auto 0;
    }
    /* Whole goose bobs while working */
    .goose-svg {
      animation: work-bob 1.6s ease-in-out infinite;
      transform-origin: bottom center;
    }
    @keyframes work-bob {
      0%,100% { transform: translateY(0) rotate(0deg); }
      30%     { transform: translateY(-12px) rotate(1.5deg); }
      70%     { transform: translateY(-5px)  rotate(-1deg); }
    }
    /* Legs alternate */
    .leg-l {
      animation: leg-left  .8s ease-in-out infinite alternate;
      transform-box: fill-box; transform-origin: 50% 0%;
    }
    .leg-r {
      animation: leg-right .8s ease-in-out infinite alternate;
      transform-box: fill-box; transform-origin: 50% 0%;
    }
    @keyframes leg-left  { to { transform: rotate(14deg);  } }
    @keyframes leg-right { to { transform: rotate(-14deg); } }
    /* Head nods at the work — pivot sits at the neck joint so the
       head (and the wrench in its bill) rock together naturally */
    .goose-head-group {
      animation: head-nod 2.4s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: 69% 74%;
    }
    @keyframes head-nod {
      0%,100% { transform: rotate(0deg); }
      40%     { transform: rotate(-8deg); }
      70%     { transform: rotate(3deg);  }
    }

    /* ── Text ── */
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      margin-top: 4px;
      letter-spacing: -.5px;
    }
    .sub {
      font-size: 15px;
      color: rgba(255,255,255,.5);
      line-height: 1.65;
      margin: 10px 0 24px;
      max-width: 400px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(107,191,78,.12);
      border: 1.5px solid rgba(107,191,78,.28);
      color: #6BBF4E;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 22px;
      border-radius: 24px;
      letter-spacing: .3px;
    }
    .badge span { font-size: 18px; animation: honk-bounce .8s ease-in-out infinite alternate; display:inline-block; }
    @keyframes honk-bounce { to { transform: scale(1.25) rotate(-8deg); } }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,.25);
      line-height: 1.8;
    }
    .footer a { color: rgba(107,191,78,.6); text-decoration: none; }
  </style>
</head>
<body>

  <!-- Background particles -->
  <div class="particles">
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
  </div>

  <div class="container">

    <!-- Brand -->
    <div class="brand">
      <svg viewBox="0 0 38 38" width="34" height="34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="14" y="2"  width="10" height="10" rx="2" fill="#6BBF4E"/>
        <rect x="14" y="26" width="10" height="10" rx="2" fill="#6BBF4E"/>
        <rect x="2"  y="14" width="10" height="10" rx="2" fill="#6BBF4E"/>
        <rect x="26" y="14" width="10" height="10" rx="2" fill="#6BBF4E"/>
        <rect x="14" y="14" width="10" height="10" rx="2" fill="#4e9938"/>
      </svg>
      <div>
        <div class="brand-text">iRam</div>
        <div class="brand-sub">Staff Help Portal</div>
      </div>
    </div>

    <!-- Animated puzzle -->
    <div class="puzzle-wrap">
      <div class="sq sq-top">   <div class="puzzle-glint"></div></div>
      <div class="sq sq-left">  <div class="puzzle-glint"></div></div>
      <div class="sq sq-center"><div class="puzzle-glint"></div></div>
      <div class="sq sq-right"> <div class="puzzle-glint"></div></div>
      <div class="sq sq-bottom"><div class="puzzle-glint"></div></div>
    </div>

    <!-- Goose -->
    <div class="goose-area">
      <svg class="goose-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 270" width="240" height="270">

        <!-- Drop shadow -->
        <ellipse cx="115" cy="258" rx="65" ry="7" fill="rgba(107,191,78,.1)"/>

        <!-- Same flat-design goose as the 404 page, scaled up, with hard hat + wrench -->
        <g transform="translate(8,32) scale(1.35)">

          <!-- LEGS (drawn first so tops hide under body) -->
          <g class="leg-l">
            <path d="M66 138 L62 156" stroke="#FFA726" stroke-width="5" stroke-linecap="round"/>
            <path d="M64 152 C56 151 49 155 45 160 L66 160 C67 156 66 154 64 152 Z" fill="#FFA726"/>
          </g>
          <g class="leg-r">
            <path d="M94 140 L98 158" stroke="#f5991c" stroke-width="5" stroke-linecap="round"/>
            <path d="M100 154 C92 153 85 157 81 162 L102 162 C103 158 102 156 100 154 Z" fill="#f5991c"/>
          </g>

          <!-- BODY + NECK — one continuous silhouette -->
          <path d="M33 36
                   C28 48 26 62 29 76
                   C31 86 26 92 25 102
                   C24 122 34 138 56 146
                   C78 153 104 151 122 142
                   C136 135 145 124 150 112
                   C154 103 158 90 164 78
                   C152 85 141 89 130 92
                   C110 86 88 85 70 93
                   C58 88 52 76 50 62
                   C49 50 50 42 53 34
                   C48 28 40 28 33 36 Z" fill="#eef4f2"/>

          <!-- TAIL — dark slate tip -->
          <path d="M130 92 C141 89 152 85 164 78 C160 88 154 98 147 107 C141 102 135 97 130 92 Z" fill="#546e7a"/>
          <path d="M134 94 C142 91 150 88 157 84 C153 92 148 99 143 104 C139 100 136 97 134 94 Z" fill="#607d8b"/>

          <!-- WING — teardrop with feather lines -->
          <path d="M58 100 C68 88 92 86 110 94 C128 101 138 111 142 119 C130 124 112 128 94 128 C76 128 62 120 58 108 Z" fill="#d8e5e0"/>
          <path d="M70 106 C88 100 108 102 124 112" stroke="#c2d4cd" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M66 114 C84 110 102 112 116 120" stroke="#c2d4cd" stroke-width="2" fill="none" stroke-linecap="round"/>

          <!-- Belly shading -->
          <path d="M44 132 C64 147 98 150 122 141 C102 150 66 150 48 138 Z" fill="#d8e5e0" opacity=".7"/>

          <!-- HEAD + hard hat group (animated nod) -->
          <g class="goose-head-group">
            <!-- Wrench held in the bill (drawn first so the bill clamps over it) -->
            <g transform="translate(7,28) rotate(-12)">
              <!-- Open-end jaw -->
              <path d="M -3 -21 A 7.6 7.6 0 1 0 3 -21 L 2 -12.5 A 2.5 2.5 0 0 1 -2 -12.5 Z" fill="#97a3ab"/>
              <!-- Handle -->
              <rect x="-2.75" y="-9" width="5.5" height="27" rx="2.75" fill="#97a3ab"/>
              <rect x="-1.6" y="-7" width="1.7" height="22" rx=".85" fill="#c9d2d8"/>
            </g>
            <!-- Sparkles near the wrench jaw (working) -->
            <circle cx="0" cy="3" r="2.2" fill="#FFD700" opacity=".9">
              <animate attributeName="opacity" values=".9;0;.9" dur="0.8s" repeatCount="indefinite"/>
              <animate attributeName="r" values="2.2;3.5;2.2" dur="0.8s" repeatCount="indefinite"/>
            </circle>
            <circle cx="15" cy="12" r="1.6" fill="#FFD700" opacity=".7">
              <animate attributeName="opacity" values=".7;0;.7" dur="1.1s" begin="0.3s" repeatCount="indefinite"/>
            </circle>
            <circle cx="11" cy="0" r="1.8" fill="#fff" opacity=".8">
              <animate attributeName="opacity" values=".8;0;.8" dur="0.6s" begin="0.15s" repeatCount="indefinite"/>
            </circle>
            <!-- Bill (root hides under head, clamps the wrench) -->
            <path d="M27 22 C17 21 9 24 5 28 C9 31 17 32 27 31 Z" fill="#FFA726"/>
            <path d="M6 29 C12 32 19 33 27 33 C27 31.5 18 31 6 29 Z" fill="#ef9416"/>
            <!-- Head -->
            <ellipse cx="39" cy="25" rx="15" ry="13" fill="#eef4f2"/>
            <!-- Hard hat -->
            <path d="M25 15 Q25 1 39 1 Q53 1 53 15 Z" fill="#FFD700"/>
            <rect x="35.5" y="-2.5" width="7" height="5" rx="2.5" fill="#FFD700"/>
            <ellipse cx="39" cy="14.5" rx="20.5" ry="4" fill="#FFC107"/>
            <line x1="33" y1="5" x2="33" y2="10" stroke="#e6a800" stroke-width="1.2"/>
            <line x1="39" y1="3.5" x2="39" y2="9" stroke="#e6a800" stroke-width="1.2"/>
            <line x1="45" y1="5" x2="45" y2="10" stroke="#e6a800" stroke-width="1.2"/>
            <!-- Nostril -->
            <ellipse cx="13" cy="26.5" rx="1.8" ry="1" fill="#e08014"/>
            <!-- Eye -->
            <circle cx="31" cy="22" r="3.2" fill="#3d2b1f"/>
            <circle cx="30" cy="21" r="1.2" fill="#fff" opacity=".85"/>
          </g>

        </g>

      </svg>
    </div>

    <h1>Scheduled Maintenance</h1>
    <p class="sub">Our technical goose is working on it.<br>The iRam Staff Help Portal will be back shortly.</p>
    <div class="badge"><span>🪿</span> HONK — we'll be right back!</div>

    <div class="footer">
      For urgent IT support, email <a href="mailto:it-support@iram.co.za">it-support@iram.co.za</a><br>
      For HR queries, email <a href="mailto:hr@iram.co.za">hr@iram.co.za</a>
    </div>

  </div>
</body>
</html>
